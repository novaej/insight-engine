[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "insight-engine"
version = "0.1.0"
description = "Backend MVP for personal investment portfolio analysis"
license = { text = "Proprietary — All Rights Reserved" }
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "sqlalchemy[asyncio]>=2.0.23",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "yfinance>=0.2.31",
    "pandas>=2.1.0",
    "numpy>=1.26.0",
    "openai>=1.6.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "apscheduler>=3.10.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "httpx>=0.25.0",
    "ruff>=0.1.0",
    "aiosqlite>=0.19.0",
]

[tool.setuptools.packages.find]
include = ["insight_engine*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
# Auto-generated Alembic migrations follow their own template style.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.ruff.lint.per-file-ignores]
# Test readability (long mock/assert lines) outweighs line-length here.
"tests/**" = ["E501"]
