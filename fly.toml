# Fly.io config. Rename `app` and set `primary_region` before first deploy
# (or run `fly launch --no-deploy` to fill them in). Secrets are set with
# `fly secrets set` — see DEPLOY.md. Non-secret env goes in [env] below.

app = "insight-engine"
primary_region = "mia"

[build]

[env]
  # In-process monitoring watchdog: this app stays always-on (below), so the
  # scheduler runs here rather than via an external cron.
  MONITORING_ENABLED = "true"
  MONITORING_CRON = "0 9 * * *"

[deploy]
  # Apply DB migrations before each release (runs with secrets available).
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine running so the APScheduler watchdog fires reliably.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
